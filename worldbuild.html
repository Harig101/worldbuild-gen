<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WORLDBUILD GEN</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #fff;
      --white: #000;
      --border: 1px solid #000;
      --color-1: rgba(0, 0, 0, 0.12);
      --color-2: rgba(0, 0, 0, 0.08);
      --color-3: rgba(0, 0, 0, 0.06);
      --color-4: rgba(0, 0, 0, 0.1);
      --color-5: rgba(0, 0, 0, 0.07);
      --fluid-blur: 80px;
      --noise-intensity: 0.03;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      padding: 40px;
    }

    #fluid-bg-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
    }

    .gradient-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      filter: blur(var(--fluid-blur));
      background: var(--black);
      overflow: hidden;
    }

    .blob {
      position: absolute;
      mix-blend-mode: multiply;
      opacity: 0.9;
    }

    .blob-1 {
      background: var(--color-1);
      width: 55vw; height: 55vw;
      top: -10%; left: -10%;
      animation: move1 28s infinite alternate cubic-bezier(0.4, 0, 0.2, 1), morph 12s infinite alternate ease-in-out;
    }
    .blob-2 {
      background: var(--color-2);
      width: 65vw; height: 65vw;
      bottom: -20%; right: -10%;
      animation: move2 35s infinite alternate cubic-bezier(0.25, 0.1, 0.25, 1), morph 18s infinite alternate-reverse ease-in-out;
    }
    .blob-3 {
      background: var(--color-3);
      width: 45vw; height: 45vw;
      top: 30%; left: 20%;
      animation: move3 22s infinite alternate cubic-bezier(0.42, 0, 0.58, 1), morph 14s infinite alternate ease-in-out;
    }
    .blob-4 {
      background: var(--color-4);
      width: 50vw; height: 50vw;
      bottom: 10%; left: 5%;
      animation: move4 30s infinite alternate ease-in-out, morph 20s infinite alternate ease-in-out;
    }
    .blob-5 {
      background: var(--color-5);
      width: 40vw; height: 40vw;
      top: 10%; right: 15%;
      animation: move5 25s infinite alternate cubic-bezier(0.3, 0.1, 0.3, 1), morph 16s infinite alternate-reverse ease-in-out;
    }

    @keyframes morph {
      0% { border-radius: 40% 60% 70% 30% / 40% 40% 60% 50%; }
      34% { border-radius: 70% 30% 50% 50% / 30% 30% 70% 70%; }
      67% { border-radius: 100% 60% 60% 100% / 100% 100% 60% 60%; }
      100% { border-radius: 40% 60% 70% 30% / 40% 40% 60% 50%; }
    }
    @keyframes move1 { 0% { transform: translate(0, 0) scale(1) rotate(0deg); } 50% { transform: translate(15vw, 25vh) scale(1.15) rotate(90deg); } 100% { transform: translate(-5vw, 15vh) scale(0.9) rotate(180deg); } }
    @keyframes move2 { 0% { transform: translate(0, 0) scale(1) rotate(0deg); } 33% { transform: translate(-20vw, -15vh) scale(0.9) rotate(-60deg); } 66% { transform: translate(-10vw, -30vh) scale(1.1) rotate(-120deg); } 100% { transform: translate(5vw, -10vh) scale(1) rotate(-180deg); } }
    @keyframes move3 { 0% { transform: translate(0, 0) scale(0.9) rotate(0deg); } 50% { transform: translate(25vw, -15vh) scale(1.25) rotate(120deg); } 100% { transform: translate(10vw, 25vh) scale(0.85) rotate(240deg); } }
    @keyframes move4 { 0% { transform: translate(0, 0) scale(1) rotate(0deg); } 50% { transform: translate(15vw, -20vh) scale(1.2) rotate(-90deg); } 100% { transform: translate(30vw, 5vh) scale(0.95) rotate(-180deg); } }
    @keyframes move5 { 0% { transform: translate(0, 0) scale(1) rotate(0deg); } 50% { transform: translate(-25vw, 20vh) scale(0.8) rotate(150deg); } 100% { transform: translate(-15vw, 35vh) scale(1.1) rotate(300deg); } }

    .noise-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: var(--noise-intensity);
      pointer-events: none;
      filter: contrast(150%) brightness(1000%);
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header {
      border-bottom: var(--border);
      padding-bottom: 20px;
      margin-bottom: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-size: calc(14px * 1.2);
      letter-spacing: 8px;
      font-weight: 400;
    }

    .controls {
      display: flex;
      gap: 20px;
    }

    button {
      background: var(--white);
      color: var(--black);
      border: var(--border);
      padding: 12px 24px;
      font-family: inherit;
      font-size: calc(11px * 1.2);
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.1s;
    }

    button:hover {
      background: var(--black);
      color: var(--white);
    }

    .categories {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .category {
      border: var(--border);
    }

    .cat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      cursor: pointer;
    }

    .cat-header:hover {
      background: #eee;
    }

    .category.expanded .cat-header {
      background: var(--black);
      color: var(--white);
    }

    .cat-title {
      font-size: calc(11px * 1.2);
      letter-spacing: 3px;
    }

    .cat-title span {
      margin-right: 10px;
    }

    .expand-icon {
      font-size: 10px;
      transition: transform 0.2s;
    }

    .category.expanded .expand-icon {
      transform: rotate(180deg);
    }

    .cat-body {
      display: none;
      border-top: var(--border);
      padding: 20px;
    }

    .category.expanded .cat-body {
      display: block;
    }

    .sub-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    .sub-tab {
      border: var(--border);
      padding: 10px 15px;
      font-size: calc(10px * 1.2);
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.1s;
    }

    .sub-tab:hover {
      background: var(--black);
      color: var(--white);
    }

    .sub-tab.active {
      background: var(--black);
      color: var(--white);
    }

    .sub-content {
      display: none;
    }

    .sub-content.active {
      display: block;
    }

    .selections {
      margin-top: 20px;
      border-top: var(--border);
      padding-top: 20px;
    }

    .sel-title {
      font-size: calc(9px * 1.2);
      letter-spacing: 2px;
      margin-bottom: 15px;
      opacity: 0.5;
    }

    .opt-btn {
      border: var(--border);
      padding: 12px 16px;
      font-size: calc(10px * 1.2);
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.1s;
      display: inline-block;
    }

    .opt-btn:hover {
      background: var(--black);
      color: var(--white);
    }

    .sel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 15px;
    }

    .sel-item {
      border-left: var(--border);
      padding-left: 15px;
    }

    .sel-label {
      font-size: calc(9px * 1.2);
      letter-spacing: 2px;
      opacity: 0.5;
      display: block;
      margin-bottom: 5px;
    }

    .sel-value {
      font-size: calc(12px * 1.2);
      letter-spacing: 1px;
      display: block;
      margin-bottom: 3px;
    }

    .sel-desc {
      font-size: calc(10px * 1.2);
      opacity: 0.6;
      display: block;
    }

    .export-area {
      margin-top: 40px;
      border-top: var(--border);
      padding-top: 20px;
    }

    textarea {
      width: 100%;
      height: 150px;
      background: var(--white);
      color: var(--black);
      border: var(--border);
      padding: 20px;
      font-family: inherit;
      font-size: calc(11px * 1.2);
      resize: none;
    }

    .copy-btn {
      margin-top: 10px;
    }

    .narrative-section {
      margin-top: 40px;
      border: var(--border);
      padding: 20px;
    }

    .narrative-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: var(--border);
      padding-bottom: 15px;
      margin-bottom: 15px;
    }

    .narrative-header h2 {
      font-size: calc(12px * 1.2);
      letter-spacing: 3px;
      font-weight: 500;
    }

    .narrative-settings {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #apiKey {
      border: var(--border);
      padding: 8px 12px;
      font-family: inherit;
      font-size: calc(10px * 1.2);
      background: var(--white);
      color: var(--black);
      width: 200px;
    }

    #modelSelect {
      border: var(--border);
      padding: 8px 12px;
      font-family: inherit;
      font-size: calc(10px * 1.2);
      background: var(--white);
      color: var(--black);
      cursor: pointer;
    }

    #generateNarrative {
      background: var(--black);
      color: var(--white);
      border: var(--border);
      padding: 10px 20px;
      font-family: inherit;
      font-size: calc(10px * 1.2);
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.1s;
    }

    #generateNarrative:hover {
      background: var(--white);
      color: var(--black);
    }

    #generateNarrative:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .narrative-output {
      min-height: 200px;
      font-size: calc(11px * 1.2);
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .narrative-output.loading {
      opacity: 0.5;
    }

    .narrative-output:empty::before {
      content: 'Generated narrative will appear here...';
      opacity: 0.4;
    }

    .model-hint {
      font-size: calc(9px * 1.2);
      opacity: 0.5;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div id="fluid-bg-wrapper">
    <div class="gradient-container">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
      <div class="blob blob-4"></div>
      <div class="blob blob-5"></div>
    </div>
    <div class="noise-overlay"></div>
  </div>

  <div class="container">
    <header>
      <h1>WORLDBUILD GEN</h1>
      <div class="controls">
        <button onclick="generateWorld()">GENERATE</button>
        <button onclick="resetAll()">RESET</button>
      </div>
    </header>

    <div class="categories" id="categories"></div>

    <div class="export-area">
      <textarea id="exportText" readonly placeholder="SELECT OR GENERATE TO SEE OUTPUT"></textarea>
      <button class="copy-btn" onclick="copyExport()">COPY TEXT</button>
    </div>

    <div class="narrative-section">
      <div class="narrative-header">
        <h2>NARRATIVE</h2>
        <div class="narrative-settings">
          <input type="password" id="apiKey" placeholder="MiniMax API Key" />
          <input type="text" id="modelId" value="MiniMax-M2.7" placeholder="Model ID" style="border: var(--border); padding: 8px 12px; font-family: inherit; font-size: calc(10px * 1.2); width: 180px;" />
          <button id="generateNarrative" onclick="generateNarrative()">GENERATE NARRATIVE</button>
        </div>
      </div>
      <div class="model-hint">Model ID (e.g. MiniMax-M2.7)</div>
      <div id="narrativeOutput" class="narrative-output"></div>
    </div>
  </div>

    let selections = {};
    let expandedCategory = null;
    let activeSub = {};

    function init() {
      const container = document.getElementById('categories');
      let html = '';

      Object.keys(worldData).forEach(key => {
        const cat = worldData[key];
        const subKeys = Object.keys(cat.subs);
        const firstSub = subKeys[0];

        html += `
          <div class="category" id="cat-${key}">
            <div class="cat-header" onclick="toggleCategory('${key}')">
              <div class="cat-title"><span>${cat.icon}</span>${cat.title}</div>
              <div class="expand-icon">▼</div>
            </div>
            <div class="cat-body">
              <div class="sub-tabs">
                ${subKeys.map(subKey => `
                  <div class="sub-tab" id="tab-${key}-${subKey}" onclick="selectSub('${key}', '${subKey}')">${cat.subs[subKey].label}</div>
                `).join('')}
              </div>
              ${subKeys.map(subKey => `
                <div class="sub-content" id="sub-${key}-${subKey}">
                  <div class="option-grid">
                    ${cat.subs[subKey].options.map(opt => `
                      <div class="opt-btn" onclick="selectOption('${key}', '${subKey}', '${opt.name}')">${opt.name}</div>
                    `).join('')}
                  </div>
                </div>
              `).join('')}
              <div class="selections" id="sels-${key}">
                <div class="sel-title">SELECTED</div>
                <div class="sel-grid" id="selgrid-${key}"></div>
              </div>
            </div>
          </div>
        `;

        activeSub[key] = firstSub;
      });

      container.innerHTML = html;

      // Initialize first sub-tab as active for each expanded category
      Object.keys(worldData).forEach(key => {
        const subKeys = Object.keys(worldData[key].subs);
        const firstSub = subKeys[0];
        document.getElementById(`tab-${key}-${firstSub}`)?.classList.add('active');
        document.getElementById(`sub-${key}-${firstSub}`)?.classList.add('active');
      });
    }

    function toggleCategory(key) {
      const cat = document.getElementById(`cat-${key}`);

      if (expandedCategory === key) {
        cat.classList.remove('expanded');
        expandedCategory = null;
      } else {
        // Close previous
        document.querySelectorAll('.category').forEach(c => c.classList.remove('expanded'));
        cat.classList.add('expanded');
        expandedCategory = key;
      }
    }

    function selectSub(catKey, subKey) {
      // Remove active from all subs in this category
      Object.keys(worldData[catKey].subs).forEach(sk => {
        document.getElementById(`tab-${catKey}-${sk}`)?.classList.remove('active');
        document.getElementById(`sub-${catKey}-${sk}`)?.classList.remove('active');
      });

      // Activate selected
      document.getElementById(`tab-${catKey}-${subKey}`)?.classList.add('active');
      document.getElementById(`sub-${catKey}-${subKey}`)?.classList.add('active');
      activeSub[catKey] = subKey;
    }

    function selectOption(catKey, subKey, optName) {
      const sub = worldData[catKey].subs[subKey];
      const opt = sub.options.find(o => o.name === optName);

      if (!opt) return;

      if (!selections[catKey]) selections[catKey] = {};

      // If random is selected, use the placeholder itself
      if (optName === '🎲 随机') {
        selections[catKey][subKey] = opt;
      } else {
        selections[catKey][subKey] = opt;
      }

      renderSelections(catKey);
      renderExport();
    }

    function renderSelections(catKey) {
      const selGrid = document.getElementById(`selgrid-${catKey}`);
      if (!selGrid) return;

      const catSels = selections[catKey];
      if (!catSels || Object.keys(catSels).length === 0) {
        selGrid.innerHTML = '';
        return;
      }

      let html = '';
      Object.keys(catSels).forEach(subKey => {
        const sel = catSels[subKey];
        if (sel) {
          html += `
            <div class="sel-item">
              <span class="sel-label">${worldData[catKey].subs[subKey].label}</span>
              <span class="sel-value">${sel.name}</span>
              <span class="sel-desc">${sel.desc}</span>
            </div>
          `;
        }
      });

      selGrid.innerHTML = html;
    }

    function generateWorld() {
      selections = {};

      Object.keys(worldData).forEach(catKey => {
        selections[catKey] = {};
        Object.keys(worldData[catKey].subs).forEach(subKey => {
          const opts = worldData[catKey].subs[subKey].options;
          // Pick random non-placeholder option
          const nonRandomOpts = opts.filter(o => !o.name.startsWith('🎲'));
          selections[catKey][subKey] = nonRandomOpts[Math.floor(Math.random() * nonRandomOpts.length)];
        });
        renderSelections(catKey);
      });

      renderExport();
    }

    function renderExport() {
      const exportText = document.getElementById('exportText');
      let lines = [];

      Object.keys(worldData).forEach(catKey => {
        const cat = worldData[catKey];
        const catSels = selections[catKey];

        if (catSels && Object.keys(catSels).some(k => catSels[k])) {
          lines.push(`━━━ ${cat.icon} ${cat.title} ━━━`);

          Object.keys(cat.subs).forEach(subKey => {
            const sel = catSels[subKey];
            if (sel) {
              lines.push(`[${cat.subs[subKey].label}]`);
              lines.push(`  ${sel.name} — ${sel.desc}`);
            }
          });

          lines.push('');
        }
      });

      exportText.value = lines.join('\n');
    }

    function copyExport() {
      const text = document.getElementById('exportText');
      if (text.value) {
        text.select();
        document.execCommand('copy');
        alert('COPIED');
      }
    }

    function resetAll() {
      selections = {};
      document.querySelectorAll('.category').forEach(c => c.classList.remove('expanded'));
      document.querySelectorAll('.sel-grid').forEach(g => g.innerHTML = '');
      document.getElementById('exportText').value = '';
      document.getElementById('narrativeOutput').innerHTML = '';
      expandedCategory = null;
    }

    async function generateNarrative() {
      const apiKey = document.getElementById('apiKey').value.trim();
      if (!apiKey) {
        alert('Please enter your API Key (SiliconFlow / StepFun)');
        return;
      }

      const model = document.getElementById('modelId').value.trim() || 'Step/step-3.5-flash';
      const output = document.getElementById('narrativeOutput');
      const btn = document.getElementById('generateNarrative');

      // Collect all selections
      let configText = '';
      Object.keys(worldData).forEach(catKey => {
        const cat = worldData[catKey];
        const catSels = selections[catKey];
        if (catSels && Object.keys(catSels).some(k => catSels[k])) {
          configText += `【${cat.title}】\n`;
          Object.keys(cat.subs).forEach(subKey => {
            const sel = catSels[subKey];
            if (sel) {
              configText += `- ${cat.subs[subKey].label}: ${sel.name}\n`;
              configText += `  ${sel.desc}\n`;
            }
          });
          configText += '\n';
        }
      });

      if (!configText.trim()) {
        alert('Please select or generate some world elements first');
        return;
      }

      const systemPrompt = `You are a worldbuilding expert. Based on the configuration provided, generate an immersive, engaging narrative description of this world. The description should:

1. Be written in Traditional Chinese (繁體中文)
2. Weave together all the elements into a coherent world narrative
3. Highlight tensions, conflicts, and unique characteristics
4. Describe the world as if writing for a novel or game setting
5. Be evocative and imaginative, not just a list
6. Around 500-800 characters

DO NOT simply list the elements. Instead, create a vivid description that shows how these elements interact and shape this world.`;

      const userPrompt = `Generate a world narrative based on this configuration:

${configText}`;

      btn.disabled = true;
      output.innerHTML = '';
      output.classList.add('loading');
      output.textContent = 'Generating...';

      try {
        // Use MiniMax API
        const response = await fetch('https://api.minimax.io/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: model,
            messages: [
              { role: 'system', content: systemPrompt },
              { role: 'user', content: userPrompt }
            ],
            temperature: 0.8,
            max_tokens: 1000
          })
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(`API Error ${response.status}: ${errorData.error?.message || response.statusText}`);
        }

        const data = await response.json();
        const narrative = data.choices[0].message.content;
        output.classList.remove('loading');
        output.textContent = narrative;

      } catch (error) {
        output.classList.remove('loading');
        output.textContent = `Error: ${error.message}`;
      } finally {
        btn.disabled = false;
      }
    }

    init();
  </script>
