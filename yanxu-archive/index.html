                content: `<p><strong>深度與結構</strong>：地底九百米。越靠近核心層，空氣越乾淨、燈光越穩定、醫療資源越近。越往下，化學霧濃度越高、淨化成本越高、每一次呼吸都在消耗肺。</p>

                contentEn: `<p><strong>Depth and Structure</strong>: 900 meters underground. The closer to the core layer, the cleaner the air, the more stable the lighting, the nearer the medical resources. The deeper you go, the higher the chemical fog concentration, the higher the purification cost, every breath consuming your lungs.</p>

                content: `<p>在湮墟，光從來不是白的。</p>

          { file: '蓝窗角色设定图.png', displayName: '【藍窗】BLUE WINDOW', narrative: '【藍窗】\n\n 代號：藍窗\n 角色：通訊專家\n\n 她的任務是維護地下鐵路的通訊網絡——確保每一條消息都能正確、及時地傳遞。\n\n 她的設備是一套改裝過的信號增強器，能夠在CORE LAYER的干擾下保持通訊暢通。\n 但這不是她最重要的工具。\n 她最重要的工具是她的沉默。\n\n 她很少說話，只用代碼交流。\n 所以當她開口時，每個人都會停下來傾聽。\n\n <i>[BLUE WINDOW]\n Codename: BLUE WINDOW\n Role: Communications Expert\n\n Her mission: maintain the underground railroad\'s communication network — ensuring every message is transmitted correctly and timely.\n\n Her equipment is a set of modified signal boosters, capable of maintaining communication despite CORE LAYER interference.\n But this isn\'t her most important tool.\n Her most important tool is her silence.\n\n She rarely speaks, communicating only in code.\n So when she speaks, everyone stops to listen.</i>',
            hasChapter: true,

            sections: [
              {
                id: '01',
                title: '01. 锈金色的日常与向上攀爬的她',
                titleEn: '01. Rust-Golden Days and the Woman Who Climbed Up',
                content: `<p>所谓呼吸，是一件极其昂贵的事情。</p>
<p>这并不是某种带有隐喻色彩的诗意修辞，而是在这地底九百米的"湮墟"中，字面意义上的物理法则。不，或者说，是经济法则更准确一些。如果你每天早晨不在中层分配站前排队领取那块灰扑扑的"呼吸牌"，你的肺就不再属于你，而是属于这座城市化学雾的填埋场。</p>
<div class="section-illustrations">
  <img src="assets/chapter01/Chapter01_Frame01_Yang_Ambition.png" alt="杨的野心">
  <img src="assets/chapter01/Chapter01_Frame02_An_Yang_Plan.png" alt="安与杨的计划">
</div>
<p>也就是说，我，安，作为一个光纹暗淡得像是在皮肤上涂了劣质荧光粉的派普族（Pipe）通风维修工，我的人生意向可以说是极其明确且单一的：活下去。不看不听，不思不想，像一条合格的水管一样，只负责让浑浊的空气通过我的身体，不留下一丝痕迹。</p>
<p><strong>无知是最好的防毒面具，这是地底生存的第一定律。</strong></p>
<p>但杨不这么想。</p>
<p>杨是个好女人。所谓好女人，在地底九百米的语境下，就是指那些明明每天吸着中等浓度的化学雾，在分配站做着枯燥的额度清算工作，却依然能把省吃俭用买来的劣质光合菌贴片，贴出一种上层穹顶区晚礼服质感的女人。</p>
<p>"听着，只要再弄到最后两克高纯度晶核废料，我就可以打通分配站站长的那个漏洞。"</p>
<p>杨在说这句话的时候，眼睛里闪烁着那种让我感到胃部抽搐的光芒。不是钠黄昏那种让人昏昏欲睡的锈金色，而是一种名为"上进心"的致命辐射。</p>
<p>"漏洞？你是说那个可以直接让你申请配额扩增，甚至被推荐去接受'接收型共振晶体'植入的漏洞吗？"我叹了口气，把手里刚领到的呼吸牌在指尖转了一圈，"杨，我说句大逆不道的话，蜂巢议会那些大人物脑子里的共振频率，大概和下层排水管里的老鼠叫声没什么区别。你为了在脑子里装个收音机去听他们吵架，值得去碰黑市的晶核废料吗？"</p>
<p>"你懂什么？"杨白了我一眼，那个白眼翻得极具阶级跃升的野心，"那是'声音'吗？那是'意志'。只要能接入共振网络，哪怕只能听不能说，我们也算半个上层人了。你难道想一辈子在通风管里闻铁锈味吗？"</p>
<p>不想。但我更不想死。</p>
<p>但问题在于，我爱她。或者说，在这样一个看什么都像蒙着一层生锈滤镜的城市里，她那种近乎病态的向上攀爬的生命力，是我唯一能感受到的温度。</p>
<p>所以，当杨告诉我，账目漏洞的填补期限就在今晚，而她还差一块晶核废料时，我那常年处于待机状态的生存本能，为了可悲的爱情，暂时短路了。</p>
<p>"我去吧。"我说。</p>
<p><strong>向下。向下。向下。</strong>去那个连锈金色光芒都嫌弃的下层矿区与排水系统。</p>`,
                contentEn: `<p>Breathing is an extremely expensive endeavor.</p>
<p>This isn't some metaphorical poetic device — in this 900-meter-deep "Yǎnxū" underground city, it's literally a physical law. Or rather, an economic law to be more precise. If you don't line up at the middle-tier distribution station every morning to collect that gray "breath token," your lungs no longer belong to you — they belong to the city's chemical fog landfill.</p>
<div class="section-illustrations">
  <img src="assets/chapter01/Chapter01_Frame01_Yang_Ambition.png" alt="Yang's Ambition">
  <img src="assets/chapter01/Chapter01_Frame02_An_Yang_Plan.png" alt="An and Yang's Plan">
</div>
<p>That is to say, I, Ahn — a Pipe族的通风维修工 whose light-marks are as dim as cheap fluorescent powder smeared on skin — my life purpose is extremely clear and singular: survive. Don't see, don't hear, don't think, don't feel. Like a qualified pipe, only responsible for letting murky air pass through my body without leaving a trace.</p>
<p><strong>Ignorance is the best gas mask — that's the first law of underground survival.</strong></p>
<p>But Yang doesn't think so.</p>
<p>Yang is a good woman. What constitutes a "good woman" at 900 meters underground? It means those who, despite inhaling moderate-concentration chemical fog daily and doing tedious quota calculations at the distribution station, can still apply cheap photosynthetic bacteria patches in a way that evokes the texture of an upper-tier穹顶区 evening gown.</p>
<p>"Listen, I just need two more grams of high-purity crystal core waste material, and I can punch through the station master's loophole."</p>
<p>When Yang said this, her eyes glistened with something that made my stomach churn. Not the drowsy rust-gold of钠黄昏, but a kind of fatal radiation called "ambition."</p>
<p>"A loophole? You mean the one that could directly let you apply for quota expansion, even get recommended for 'receiving-type resonant crystal' implantation?" I sighed, spinning the breath token I'd just collected between my fingers. "Yang, I'm committing heresy here, but the resonance frequencies in the heads of those Hive Council big shots are probably no different from rat squeals in the lower drainage pipes. Is it worth touching black market crystal waste just to install a radio in your head to listen to them argue?"</p>
<p>"What do you know?" Yang gave me a look, the eye-roll full of class-climbing ambition. "That's not 'sound' — it's 'will.' As long as we can connect to the resonance network, even if we can only listen and not speak, we're half upper-tier people. You want to smell rust in ventilation pipes forever?"</p>
<p>I don't. But I want to live even more.</p>
<p>But here's the problem: I love her. Or rather, in a city where everything looks like it's coated with a rusty filter, her almost pathological climbing vitality is the only warmth I can feel.</p>
<p>So when Yang told me the deadline for filling the account loophole was tonight, and she was still one crystal core short — my usual standby survival instinct temporarily short-circuited for the sake of pathetic love.</p>
<p>"I'll go." I said.</p>
<p><strong>Down. Down. Down.</strong> To the lower mines and drainage systems that even rust-gold light deems too嫌弃.</p>`

                content: `<p>下层的化学雾浓度，已经到了可以让肺部直接发表演讲抗议的地步。</p>

<p>我戴着面罩，手里攥着杨攒了半年的配额，像一只在猫窝边缘试探的耗子，摸进了深层排水系统的黑市。老实说，交易本身顺利得让我觉得是个陷阱——而事实证明，我的直觉虽然迟钝，但通常在这个时候准得要命。</p>
<p>就在废料刚刚交接到我手里的一瞬间，警报声撕裂了下层的沉闷。</p>
<p>"执法队扫荡！该死的共振狗——！"</p>
<p>人群像被倒了热水的蚁群一样炸开。我甚至来不及分辨方向，只是本能地往更深的阴影里钻。然而，就在我准备把自己塞进一个废弃排风扇的缝隙时，一只极其有力的手抓住了我的后领，直接把我拖进了一道暗门里。</p>
<p>门后是一片连钠黄昏的光都照不进来的绝对黑暗。</p>
<p>"闭嘴。不想被共振探针扫到，就停止你那可笑的急促呼吸。"一个沙哑的声音在黑暗中响起。</p>
<p>我立刻照做，连光合菌都吓得暗了几个度。借着极其微弱的环境光，我意识到我被几个人围住了。他们身上的光纹被刻意压抑到了极限，几乎与岩石融为一体。</p>
<p><strong>断联组织。那些主动切断共振网络，游荡在法律与常理之外的"无籍人口"。</strong></p>
<p>"你在发抖。派普族的工蜂？还是上面派来送死的诱饵？"另一个声音问道，带着某种金属般的冷意。</p>

<p>我看到了什么？我无法用语言描述。我的大脑因为缺乏对应的词汇容器而陷入了狂乱的死机状态。"蓝色"，这个在旧纪元音频里出现过的发音，此刻化作了某种实质性的毒药，在我的神经里横冲直撞。</p>
<p>"呕——"</p>
<p>我的身体比大脑先一步做出了反应。强烈的眩晕感和剧烈的恶心感瞬间淹没了我，我跪倒在地，胃里的酸水混合着化学雾的残渣吐了一地。那一刻，我感觉自己原本认知的世界正在像廉价墙皮一样剥落。</p>

<p>"生理性排斥，视锥细胞尚未恢复，过曝反应典型。他不是共振家族的线人，那些人的眼睛早就用补充剂习惯了。"</p>

                content: `<p>丹开始频繁地出现在我的生活里。</p>

<p>根本没有丹去砸灯。在杨惊恐的瞳孔倒影里，那个像疯子一样暴起、毫无征兆地用钠灯自残的神经病，是我自己。</p>
<p>这种认知上的错位感彻底摧毁了我的防线。我崩溃了。在鲜血和黑暗中，我抓着杨的手，把一切都吐了出来。</p>
<p>我告诉了她下层排水系统的遭遇，告诉了她我接触了非法的"蓝窗"，告诉了她我看到了世界上还有另一种名为"蓝色"的东西。最重要的是，我残忍地扒开了她那个阶级跃升的美梦——我告诉她，"接收型共振晶体"根本不是倾听神明旨意的恩赐，那是一个单向的思想清洗器。一旦植入，她的自我就会被共振网络庞大的谎言与恐惧所淹没。她不仅会变成一具行尸走肉，共振网络还会顺着她的记忆，查出我接触过蓝窗的死罪。</p>
<p>我看着杨的眼睛。那双刚才还盛满星光的眼睛，在一瞬间失去了所有的焦距。</p>
<p>她的世界观在三分钟内被我亲手砸得粉碎。她一直以来拼命追求的、引以为傲的生存目标，原来只是一张为了方便屠宰而设立的单程车票。</p>
<p>"我们逃吧。"杨反手抓紧了我，她的声音颤抖，却带着一种近乎绝望的决绝。她是一个好女人，好到即便认清了世界的荒谬，依然愿意为了我放弃那张毒苹果的兑换券。"去下层，去排水系统……我们去找那些断联者。"</p>`,
                contentEn: `<p>Dan began appearing frequently in my life.</p>
<p>He蹲在扇叶上嘲笑我的姿势 when I oiled the exhaust fan; he sat across the table when I ate配给合成粮, delivering endless脱口秀 about "carbohydrates being the cheapest stabilization tool for the lower class."</p>
<div class="section-illustrations">
  <img src="assets/chapter04/Chapter04_Frame01_Yang_CrystalImplant.png" alt="Yang's Crystal Implant">
  <img src="assets/chapter04/Chapter04_Frame02_An_Confession.png" alt="An's Confession">
</div>
<p>At first, I tried to ignore him. But later I realized — when there's a voice in your head that's smarter than you, more cutting, and completely洞悉你所有的懦弱 — you can't ignore it. He was like a fish bone in my throat, constantly reminding me: you're no longer pure, you've been polluted by that blue light, you're a装睡的瞎子.</p>
<p>But what truly pressed that fish bone into my heart was Yang.</p>
<p>That night, Yang rushed back to our small residence with a近乎狂热的喜悦 I'd never seen. Her photosynthetic bacteria patches glowed with病态的高光 under her excited mood.</p>
<p>"Ahn! It's approved! Approved from above!" Yang grabbed my shoulders, nails几乎嵌进我的肉里. "A B-party legislator needs a middle-tier representative. Because of that high-purity crystal core waste material I submitted, I was selected! They'll perform the 'receiving-type resonant crystal' implantation surgery next month! We can even move to the穹顶区边缘, no longer having to breathe this damn chemical fog!"</p>
<p>She excitedly描绘着 that future filled with clean oxygen and bright light patterns. Behind her, Dan leaned against the wall, looking at her with the眼神 of someone observing濒死实验小白鼠.</p>
<p>"How touching," Dan吐出一口虚无的烟圈. "A工蜂 finally earned a spot on the dining table, and感激涕零because the plate is made of gold. Are you going to tell her, Ahn? Tell her what's really inside that毒苹果 called 'crystal'?"</p>
<p>"Shut up." I咒骂.</p>
<p>"Tell her!" Dan暴起,跨过狭小的房间, kicking the table over, then grabbing the portable sodium lamp on the table and smashing it against his own forehead.</p>
<p>"Bang — !"</p>
<p>The glass-shattering sound was like a thunderclap in the cramped room. The rust-gold light flickered twice and went out completely.</p>
<p>"Ahn! Are you insane?!"</p>
<p>Yang's terrified scream tore through the darkness.借着窗外透进来的微弱路灯, I lowered my head in a daze.</p>
<p><strong>In my hand I held half a blood-stained lamp tube. A warm sting came from my forehead. Blood mixed with chemical fog dust flowed into my eyes.</strong></p>
<p>There was no Dan smashing the lamp. In Yang's terrified pupils, the疯子 who暴起 without warning, self-harming with the sodium lamp, was me myself.</p>
<p>This认知错位感 completely destroyed my defenses. I collapsed. In blood and darkness, I grabbed Yang's hand and吐了出来 everything.</p>
<p>I told her about the下层排水系统的遭遇, told her I'd contacted the illegal "Blue Window," told her I'd seen another thing in this world called "blue." Most importantly, I brutally扒开了 her class-climbing dream — I told her the "receiving-type resonant crystal" was never a grant from gods listening to your prayers, but a one-way ideological washing machine. Once implanted, her self would be drowned in the resonance network's vast lies and fears. Not only would she become a行尸走肉, the resonance network would follow her memories to find out I'd contacted Blue Window — a capital crime.</p>
<p>I looked into Yang's eyes. Those eyes that had just been full of starlight lost all focus in an instant.</p>
<p>Her worldview was shattered by my own hands in three minutes. Her survival goal she'd been desperately pursuing, that she'd been proud of, was just a one-way ticket set up for convenient slaughter.</p>
<p>"Let's run." Yang grabbed me back tightly, her voice trembling but带一种近乎绝望的决绝. She was a good woman, so good that even recognizing the world's absurdity, she was still willing to give up that poison apple兑换券 for me. "Go to the lower levels, to the drainage system... find those断联者."</p>`
              },
              {

                title: '05. 监听器的狂想曲与单向门',
                titleEn: '05. The Surveillance Device Rhapsody and the One-Way Door',
                content: `<p>我们开始疯狂地收拾东西。其实没什么好收拾的，几个劣质的呼吸面罩，仅存的几张呼吸牌。</p>

  <img src="assets/chapter05/Chapter05_Frame01_Escape_Preparation_SteelPipe.png" alt="逃跑准备">

<p>就在我们准备推开门，潜入这座城市最深处的阴影时——</p>
<p>"轰——！"</p>
<p>门没有被推开，而是被定向爆破炸成了碎片。</p>
<p>巨大的冲击波将我们掀翻在地。几道刺眼的高亮度战术探照灯直接灼烧着我们本就脆弱的光合菌。一群全副武装、佩戴着厚重防毒面具的安保部队涌入了我们狭小的房间。</p>
<p>我趴在地上，耳朵里满是耳鸣声，但我突然明白了什么。</p>
<p>"你们……怎么会……"杨绝望地在地上挣扎。</p>
<p>为什么会这么快？为什么他们会知道？</p>
<p>我的视线越过士兵军靴的缝隙，看向了天花板的通风口。我突然想起了前几天在下层遭遇扫荡时，那几个没能跑掉的断联者。在针对光合菌的极度残酷的神经刑讯下，有什么秘密是撬不开的呢？</p>
<p><strong>没有所谓的未卜先知，也没有神明般的共振感应。有的只是最古老、最廉价的物理监听网络。</strong>从我接触蓝窗逃回来的那一天起，这个房间的每一个微小呼吸，都已经被记录在案。</p>
<p>而我刚才向杨坦白的那番"大逆不道"的真相，就是触发这张罗网收网的最后口令。</p>
<p>"目标确认。中层感染者及同谋，就地执行最高级别拘捕。"一个冰冷的电子音响起。</p>
<p>一名士兵举起了枪托，狠狠地砸向我的后脑勺。</p>
<p>在意识陷入黑暗的最后一秒，我没有感到疼痛，我只看到"丹"站在那个士兵的身后。他没有来救我，也没有愤怒。他只是用一种极其悲悯又极度嘲弄的眼神看着我，嘴角勾起了一个近乎癫狂的微笑。</p>`,
                contentEn: `<p>We began frantically packing. Actually there was nothing to pack — just a few cheap呼吸面罩, the few remaining breath tokens.</p>
<div class="section-illustrations">
  <img src="assets/chapter05/Chapter05_Frame01_Escape_Preparation_SteelPipe.png" alt="Escape Preparation">
  <img src="assets/chapter05/Chapter05_Frame02_Door_Breach.png" alt="Door Breach">
</div>
<p>Just as we were about to push open the door and dive into the deepest shadows of this city —</p>
<p>"Boom — !"</p>
<p>The door didn't open — it was blown apart by directional explosives.</p>
<p>The massive blast wave threw us to the floor. Several blindingly bright tactical searchlights scorched our already fragile photosynthetic bacteria. A group of fully armed security forces in heavy防毒面具 flooded into our cramped room.</p>
<p>I was on the ground, ears full of tinnitus, but I suddenly understood something.</p>
<p>"How... could you..." Yang绝望地挣扎 on the ground.</p>
<p>Why so fast? Why did they know?</p>
<p>My gaze越过士兵军靴的缝隙, looking at the ceiling ventilation opening. I suddenly remembered the sweep in the lower levels days ago, the few断联者 who couldn't escape. Under the极度残酷的神经刑讯 against photosynthetic bacteria, what secret couldn't be撬开?</p>
<p><strong>There was no所谓的未卜先知, no god-like resonance sensing. There was only the oldest, cheapest physical surveillance network.</strong> From the day I escaped after contacting Blue Window, every tiny breath in this room had been on record.</p>
<p>And the "heretical" truth I just confessed to Yang was the final password that triggered this net to close.</p>
<p>"Target confirmed. Middle-tier infected person and accomplice, immediate highest-level arrest." A cold electronic voice rang out.</p>
<p>A soldier raised his rifle butt,狠狠砸向我的后脑勺.</p>
<p>In the last second before consciousness plunged into darkness, I felt no pain. I only saw "Dan" standing behind that soldier. He didn't come to save me, wasn't angry. He just looked at me with an extremely悲悯又极度嘲弄的眼神, the corner of his mouth raised in an almost癫狂的微笑.</p>`
              },
              {
                id: '06',
                title: '06. 碎镜中的英雄与懦夫的倒影',
                titleEn: '06. The Hero and Coward\'s Reflection in the Shattered Mirror',
                content: `<p>我醒来时，闻到的是一种混杂着霉味和下水道污水的恶臭。</p>
<p>这是一个下层废弃矿区的储藏室。没有钠黄昏的光，只有一台外壳破裂的旧纪元电视机，正发出"滋滋"的电流声。屏幕上播放着蜂巢议会的例行通报：</p>
<p>"……今日凌晨，安保部队成功捣毁一处位于中层C-4区域的叛乱分子据点。男性主犯在逃，女性从犯已移交清洗中心进行'记忆格式化与边缘化流放'处理……"</p>
<div class="section-illustrations">
  <img src="assets/chapter06/Chapter06_Frame01_An_Attacking_Dan.png" alt="安攻击丹">
  <img src="assets/chapter06/Chapter06_Frame02_Mirror_Revelation.png" alt="镜中真相">
</div>
<p>"醒了？痴情种。"</p>
<p>丹坐在电视机旁边的破纸箱上，指间依旧夹着那根不存在的烟。红色的微光照亮了他那张充满戾气的脸。</p>
<p>"杨呢？杨在哪？！"我猛地从地上弹起来，像一头被逼入绝境的野兽般扑向他。</p>
<p>"在电视里咯。'移交清洗中心'，你知道这是什么意思吧？就是脑子被烧成白痴，然后扔到矿区最底层去挖矿，直到变成一块没有温度的石头。"丹冷冷地看着我，"至于你，不用谢我。如果不是我在那个安保的枪托砸下来的一瞬间接管了你的身体，用一把生锈的螺丝刀捅穿了他的动脉然后跳进了排风管道，你现在大概和她在同一个焚化炉里排队。"</p>
<p>"你救了我？"我死死地盯着他，眼睛里几乎要滴出血来，"你救了我，却把她留在了那里？！你为什么不救她！为什么不让我去保护她！"</p>
<p>所有的绝望、懊悔和认知的过载在这一刻彻底爆发。我挥起拳头，狠狠地砸向丹的脸。</p>
<p>一拳。两拳。我把所有的愤怒倾注在这个自称救了我的混蛋身上。拳头打在肉体上的触感是如此真实，指骨传来的剧痛让我感到一种病态的快感。我要杀了他，我要杀了这个只会说风凉话的幻影，我要杀了这座城市。</p>
<p>丹被我打得跌坐在地上，鼻青脸肿，鲜血从他的嘴角流下。但他没有还手，他只是躺在尘土里，疯狂地、歇斯底里地大笑起来。</p>
<p>"哈哈哈……你还在装什么呢，安？你到底在打谁？"</p>
<p>他颤抖着抬起手，指向了房间角落里的一面沾满灰尘的破烂镜子。</p>
<p>我顺着他的手指看过去。</p>
<p><strong>电视机微弱的蓝光打在镜面上。镜子里没有丹。镜子里只有一个穿着派普族工装、满脸鲜血、鼻青脸肿、右手关节血肉模糊的男人。</strong></p>
<p><strong>那是我。</strong></p>
<p><strong>我在打我自己。</strong></p>
<p>丹的身影在空气中像被风吹散的化学雾一样，渐渐扭曲、消失。</p>
<p><strong>没有赛博朋克式的救世主，没有藏在暗处的超级战友。一切都是我这颗承受不住"认知过曝"的大脑制造出来的幻觉。</strong></p>
<p>在安保部队破门而入的那一刻，那个抛弃了相爱多年的女友，像条野狗一样夺路而逃的懦夫，不是什么被唤醒的反叛人格。那就是我。是我为了活下去的本能，压倒了一切道德与爱情。</p>
<p>我瘫坐在碎玻璃里，看着镜子里那个丑陋的自己，终于忍不住放声大哭。<strong>清醒，真的是一种不治之症。</strong></p>`,
                contentEn: `<p>When I woke up, what I smelled was a stench mixed with mold smell and sewer wastewater.</p>
<p>This was a storage room in an abandoned lower-level mining area. No sodium dusk light — only an old-era TV with a cracked shell, emitting "buzzing" electrical sounds. On screen, the Hive Council's regular bulletin played:</p>
<p>"...Early this morning, security forces successfully raided a rebel stronghold in middle-tier C-4 area. Male main suspect at large, female accomplice handed over to the Purification Center for 'memory formatting and marginalization exile' processing..."</p>
<div class="section-illustrations">
  <img src="assets/chapter06/Chapter06_Frame01_An_Attacking_Dan.png" alt="An Attacking Dan">
  <img src="assets/chapter06/Chapter06_Frame02_Mirror_Revelation.png" alt="Mirror Revelation">
</div>
<p>"Awake, lovesick fool?"</p>
<p>Dan sat on a broken cardboard box next to the TV, still holding that non-existent cigarette between his fingers. Red micro-light illuminated his face full of malice.</p>
<p>"Where is Yang? WHERE IS YANG?!" I leapt up from the ground, pouncing towards him like a beast driven to desperation.</p>
<p>"She's in the TV, obviously. 'Handed over to Purification Center' — you know what that means, right? Brain burned into idiot, then thrown to the lowest mining level to dig ore until becoming a rock without temperature." Dan looked at me coldly. "As for you — don't thank me. If I hadn't taken over your body the moment the security's rifle butt was about to strike your head, stabbing through his artery with a rusty screwdriver and jumping into the exhaust pipe — you'd probably be in the same crematorium as her, in line."</p>
<p>"You saved me?" I stared at him fixedly, eyes almost dripping blood. "You saved me but left her there?! Why didn't you save her! Why didn't you let me protect her!"</p>
<p>All despair, regret, and cognitive overload erupted at this moment. I swung my fist, hard at Dan's face.</p>
<p>Punch. Two punches. I poured all my anger onto this bastard who claimed to have saved me. The sensation of fist hitting flesh was so real — the sharp pain from my knuckles gave me a kind of pathological pleasure. I wanted to kill him, wanted to kill this phantom who only knew how to speak cold truths, wanted to kill this entire city.</p>
<p>Dan was knocked to the ground, beaten black and blue, blood flowing from the corner of his mouth. But he didn't fight back — he just lay in the dust, laughing wildly, hysterically.</p>
<p>"Hahaha... What are you still pretending for, Ahn? Who are you really hitting?"</p>
<p>He trembling raised his hand, pointing to a dusty broken mirror in the corner of the room.</p>
<p>I followed his finger to look.</p>
<p><strong>The TV's faint blue light shone on the mirror surface. There was no Dan in the mirror. There was only a man in Pipe worker uniform, face covered in blood, black and blue, right hand knuckles bloody and blurred.</strong></p>
<p><strong>That was me.</strong></p>
<p><strong>I was hitting myself.</strong></p>
<p>Dan's figure in the air, like chemical fog blown apart by wind, gradually twisted and disappeared.</p>
<p><strong>No cybernetic savior, no hidden super ally. Everything was just a hallucination produced by my brain that couldn't handle "cognitive overexposure."</strong></p>
<p>At the moment security forces broke through the door, that coward who abandoned his lover of many years, fleeing like a wild dog — that wasn't some awakened rebellious personality. That was me. It was my survival instinct overriding all morality and love.</p>
<p>I collapsed sitting on broken glass, looking at my ugly reflection in the mirror, finally letting out a loud cry. <strong>Awakening — truly an incurable disease.</strong></p>`

                title: '07. 以我残躯化烈火',
                titleEn: '07. Using My Remains to Become a Blazing Fire',
                content: `<p>大人总说，地底都市的钠黄昏是维持光合菌存活的恩赐。</p>
<p>所谓恩赐，大概就是那种刺眼到让人几乎睁不开眼睛，却又不得不强迫自己去直视的东西吧。比如此刻穹顶区议会大厅外，那些亮得几乎要灼伤视网膜的人造太阳。</p>
<div class="section-illustrations">
  <img src="assets/chapter07/Chapter07_Frame01_An_SuicideVest.png" alt="安的自爆背心">
  <img src="assets/chapter07/Chapter07_Frame02_Father_Sacrifice.png" alt="父亲的牺牲">
</div>
<p>我还是个孩子，所以我不太懂大人们的逻辑。我只知道，作为中层区域少有的、抽中了"穹顶参观限时通行证"的幸运家庭，父亲今天牵着我的手时，手心里全是因为激动而渗出的冷汗。</p>
<p>"看啊，这就是议会大厅，整座城市最纯粹的共振频率就是从这里发出的。"父亲指着那扇洁白得毫无瑕疵的大门，语气里满是那种我并不理解的虔诚。</p>
<p>然而，神圣的共振并没有发生。</p>
<p>打破那份洁白的，是一团从议会大厅外墙巨型通风口里"呕吐"出来的污物。</p>
<p>那是一个怎样的人呢？或者说，那还能被称为一个人吗？他穿着破烂的派普族工装，浑身上下沾满了下水道的恶臭、暗红色的干涸血迹和高浓度的化学粉尘。他的身上绑着一种极其粗劣的背心——用晶核废料和雷管东拼西凑缠出来的死亡装置。</p>
<p>如果说这是一场伟大起义的开端，那这起义未免也太缺乏品味了。</p>
<p>那个像患了狂犬病一样的男人，手里仅仅握着一把生锈的螺丝刀。他嘶吼着一种毫无意义的、类似野兽濒死前的哀鸣，扑向了刚好从大厅走出来的、那些拥有着极其明亮光纹的大人物们。</p>
<p>动作毫无美感可言。扎进去，拔出来。鲜血瞬间溅满了洁白的地砖。</p>
<p>安保部队的枪声在下一秒就响起了。但在密集的弹雨将那头生锈的野兽撕裂之前，他按下了手里那根简陋的引爆线。</p>
<p><strong>剧烈的光和热膨胀开来的那一刻，我甚至没来得及感觉到恐惧。因为在爆炸的冲击波抵达我的视网膜之前，父亲已经扑了过来。</strong></p>
<p>父亲的后背并不宽广。但在那一瞬间，他用一种完全违反他平时唯唯诺诺性格的绝对速度，将我死死压在了身下。他用自己所有的质量，替我挡住了那团由晶核废料催生出来的劣质太阳。</p>
<p>等我被人从废墟里刨出来的时候，父亲已经死了。死得极其彻底，毫无悬念。</p>
<p>我并没有立刻哭出声来。我只是呆呆地看着地砖上混杂在一起的、大人物的血，恐怖分子的血，还有我父亲的血。<strong>在物理学的定义里，它们的颜色并没有什么阶级之分。</strong></p>
<p>……</p>
<p>"呜咽。呜咽。呜咽。"</p>
<p>隔壁房间里，母亲的哭声像是一台坏掉的节拍器，没有起伏，却又让人窒息，像极了中层通风管道里那永远不停歇的风声。</p>
<p>我一个人坐在客厅的黑暗里，看着那台唯一还亮着的旧电视。</p>
<p>屏幕闪烁着幽蓝的光，新闻女主播的光纹在镜头前亮得刺眼，她的声音甚至带着某种令人作呕的、完美的共振频率：</p>
<p>"……嫌疑人安（Ahn），中层派普族通风维修工，于今日下午发动了极其恶劣的自杀式袭击，导致多名无辜人员伤亡……"</p>
<p>"……鉴于下层暴民失控的危险性已得到证实，A派议员已联合提出紧急决议：正式驳回B派关于开放资源与阶级流动的全部改革法案。自即日起，下层呼吸配额削减百分之二十，安保级别提升至最高……"</p>
<p>屏幕里的声音渐渐变得模糊。</p>
<p>我突然觉得这是一件极其可笑的事情。虽然我还只是个孩子，但我本能地察觉到了某种荒诞的闭环。</p>
<p>那个叫安的男人，那个把我父亲连同那些大人物一起炸成碎片的杀人魔，他在生命的最后一刻，大概是觉得自己正在用残躯化作烈火，去烧穿这座城市无尽的钠黄昏吧？</p>
<p><strong>可惜啊，物理法则早就写好了结局。在极度缺氧的地下深渊里，火，是燃不长久的。</strong></p>
<p><strong>他的火没有烧毁任何东西。那团自诩为觉醒与清醒的烈焰，最终仅仅是变成了蜂巢议会手里最好的一把焊枪——</strong></p>
<p><strong>他们用这把焊枪，名正言顺地，把我们原本就生锈的牢笼，焊得更加死寂，更加坚不可摧了。</strong></p>
<p>我关掉了电视机。在这座为了活下去而学会不看的城市里，黄昏，依然永恒。</p>`,
                contentEn: `<p>Adults always said that the sodium dusk of the underground city was a blessing for photosynthetic bacteria survival.</p>
<p>A blessing — probably meaning something so blinding you can barely keep your eyes open, yet have to force yourself to stare at anyway. Like the artificial suns outside the穹顶区 parliament building right now, so bright they almost scorched retinas.</p>
<div class="section-illustrations">
  <img src="assets/chapter07/Chapter07_Frame01_An_SuicideVest.png" alt="An's Suicide Vest">
  <img src="assets/chapter07/Chapter07_Frame02_Father_Sacrifice.png" alt="Father's Sacrifice">
</div>
<p>I was just a child, so I didn't really understand adult logic. All I knew was — as one of the rare families in the middle-tier who had won the "穹顶参观限时通行证" lottery, my father held my hand today, his palm sweating from excitement.</p>
<p>"Look, this is the parliament hall, where the purest resonance frequency in the entire city is emitted from." Father pointed at that flawlessly white door, his voice full of a piety I didn't understand.</p>
<p>However, the sacred resonance didn't happen.</p>
<p>What broke that whiteness was a mass of "vomited" filth from the parliament hall's giant ventilation opening on the exterior wall.</p>
<p>What kind of person was that? Or rather — could it still be called a person? He wore tattered Pipe族工装, covered all over with the stench of sewers, dark red dried blood stains, and high-concentration chemical dust. On his body was an extremely crude vest — a death device assembled from crystal core waste and detonators.</p>
<p>If this was the beginning of a great uprising, the uprising was in terribly poor taste.</p>
<p>That man acting like he had rabies, holding only a rusty screwdriver, roared a meaningless, beast-like dying gasp, and pounced on those大人物 with extremely bright light patterns coming out of the hall.</p>
<p>The movements had no aesthetic merit whatsoever. Stab in, pull out. Blood instantly splattered across the white floor tiles.</p>
<p>The security forces' gunshots rang out the next second. But before the dense rain of bullets could tear that rusty beast apart, he pressed the简陋引爆线 in his hand.</p>
<p><strong>At the moment intense light and heat expanded — I didn't even have time to feel fear. Because before the blast's shockwave reached my retina, father had already pounced over me.</strong></p>
<p>Father's back wasn't wide. But at that instant, he used a speed completely against his usual timid personality to press me firmly beneath him. He used all his mass to shield me from that劣质太阳 created by crystal core waste.</p>
<p>When people dug me out of the rubble, father was already dead. Dead extremely completely, without suspense.</p>
<p>I didn't immediately cry out. I just sat there dazed, looking at the mixed blood on the floor tiles — the big shots' blood, the terrorist's blood, and my father's blood. <strong>In physics' definition, their colors had no class distinction.</strong></p>
<p>...</p>
<p>"Sob. Sob. Sob."</p>
<p>In the next room, mother's crying was like a broken metronome, no起伏, yet suffocating, just like the eternally unceasing wind sound in the middle-tier ventilation pipes.</p>
<p>I sat alone in the dark of the living room, watching that only lit old TV.</p>
<p>The screen flickered with faint blue light, the news anchor's light pattern bright and blinding on camera, her voice even carrying some nauseating, perfect共振频率:</p>
<p>"...Suspect Ahn (安), middle-tier Pipe族 ventilation maintenance worker, launched an extremely malicious suicide attack this afternoon, causing multiple innocent casualties..."</p>
<p>"...Given the proven danger of lower-level mob失控, A-party legislators have jointly proposed an emergency resolution: officially rejecting B-party's complete reform bill regarding resource openness and class mobility. Effective immediately, lower-level breath quotas reduced by twenty percent, security level raised to maximum..."</p>
<p>The sound from the screen gradually blurred.</p>
<p>I suddenly felt this was an extremely ridiculous matter. Although I was just a child, I instinctively察觉到了 a kind of荒诞闭环.</p>
<p>That man named Ahn, the murderer who blew my father and those大人物 to pieces — at his last moment of life, he probably thought he was using his remains to become a blazing fire, to burn through this city's endless钠黄昏, right?</p>
<p><strong>Unfortunately, the laws of physics had long written the ending. In the extremely oxygen-deficient underground abyss, fire — doesn't burn for long.</strong></p>
<p><strong>His fire burned nothing. That flame self-proclaimed as awakening and clarity ultimately just became the best welding torch in the Hive Council's hands —</strong></p>
<p><strong>They used this welding torch, with full propriety, to weld our already rusty prison even more silent, even more unbreakable.</strong></p>
<p>I turned off the TV. In this city that learned to not look in order to survive, the dusk — still eternal.</p>`

        return `
        <div class="image-card" onclick="openViewer('${folderId}', ${index})">
          <img src="assets/${item.file}" alt="${item.displayName || item.file}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><rect fill=%22%23333%22 width=%22200%22 height=%22200%22/><text x=%2250%25%22 y=%2250%25%22 fill=%22%23666%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2214%22>NO IMAGE</text></svg>'">
          <div class="card-info">
            <div class="card-name">${item.displayName || item.file}</div>
            <div class="card-actions">
              ${showNarrative}
              ${hasChapter}
            </div>
          </div>
        </div>
      `}).join('');
    }

    function openViewer(folderId, itemIndex) {
      const folder = ARCHIVE_DATA.find(f => f.id === folderId);
      if (!folder) return;

      const item = folder.items[itemIndex];
      if (!item || item.hasChapter) return;

      currentItem = item;
      currentView = 'viewer';

      const grid = document.getElementById('folderGrid');
      const imageGrid = document.getElementById('imageGrid');
      const viewer = document.getElementById('viewer');
      const chapterReader = document.getElementById('chapterReader');
      const backBtn = document.getElementById('backBtn');

      document.querySelector('.terminal-header').style.display = 'none';
      grid.style.display = 'none';
      imageGrid.style.display = 'none';
      viewer.classList.add('active');
      chapterReader.classList.remove('active');
      backBtn.classList.add('active');

      document.getElementById('viewerImg').src = `assets/${item.file}`;
      document.getElementById('viewerTitle').textContent = item.displayName || item.file;
      let narrativeHtml = item.narrative.replace(/\n/g, '<br>');
      if (item.unlockKey && !hiddenFolderUnlocked) {
        narrativeHtml += `<div class="unlock-section" onclick="unlockHiddenFolder()"><span class="unlock-text">「自由之路，藏於地下」</span><br><span class="unlock-subtext">[ 解鎖隱藏文件 ]</span></div>`;
      }
      document.getElementById('viewerText').innerHTML = narrativeHtml;
    }

    function openChapter(folderId, itemIndex) {
      const folder = ARCHIVE_DATA.find(f => f.id === folderId);
      if (!folder) return;

      const item = folder.items[itemIndex];
      if (!item || !item.hasChapter) return;

      currentItem = item;
      currentSection = 0;
      currentView = 'chapter';

      const grid = document.getElementById('folderGrid');
      const imageGrid = document.getElementById('imageGrid');
      const viewer = document.getElementById('viewer');
      const chapterReader = document.getElementById('chapterReader');
      const backBtn = document.getElementById('backBtn');

      document.querySelector('.terminal-header').style.display = 'none';
      grid.style.display = 'none';
      imageGrid.style.display = 'none';
      viewer.classList.remove('active');
      chapterReader.classList.add('active');
      backBtn.classList.add('active');

      document.getElementById('chapterTitle').textContent = item.chapterTitle;
      document.getElementById('chapterSubtitle').textContent = item.chapterSubtitle;

      renderSectionNav();
      renderSection();
    }

    function renderSectionNav() {
      const item = currentItem;
      if (!item || !item.sections) return;

      const nav = document.getElementById('sectionNav');
      nav.innerHTML = item.sections.map((section, index) => `
        <button class="nav-item ${index === currentSection ? 'active' : ''}" onclick="goToSection(${index})">
          ${section.id}
        </button>
      `).join('');
    }

    function goToSection(index) {
      currentSection = index;
      renderSection();
      window.scrollTo(0, 0);
    }

    function prevSection() {
      if (currentSection > 0) {
        currentSection--;
        renderSection();
        window.scrollTo(0, 0);
      }
    }

    function nextSection() {
      const item = currentItem;
      if (item && currentSection < item.sections.length - 1) {
        currentSection++;
        renderSection();
        window.scrollTo(0, 0);
      }
    }

    function goBack() {
      if (currentView === 'chapter') {
        openFolder(currentFolder.id);
      } else if (currentView === 'viewer') {
        openFolder(currentFolder.id);
      } else if (currentView === 'images') {
        renderFolders();
      }
    }

    // Event listeners
    document.getElementById('prevSection').addEventListener('click', prevSection);
    document.getElementById('nextSection').addEventListener('click', nextSection);

    // Init
    renderFolders();
  </script>
</body>
</html>
