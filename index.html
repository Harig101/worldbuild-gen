<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WORLDBUILD GEN</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #FAF9F5;
      --white: #000;
      --border: 1px solid #000;
      --color-1: rgba(0, 0, 0, 0.12);
      --color-2: rgba(0, 0, 0, 0.08);
      --color-3: rgba(0, 0, 0, 0.06);
      --color-4: rgba(0, 0, 0, 0.1);
      --color-5: rgba(0, 0, 0, 0.07);
      --fluid-blur: 80px;
      --noise-intensity: 0.03;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      padding: 40px;
    }

    #fluid-bg-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
    }

    .gradient-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      filter: blur(var(--fluid-blur));
      background: var(--black);
      overflow: hidden;
    }

    .blob {
      position: absolute;
      mix-blend-mode: multiply;
      opacity: 0.9;
    }

    .blob-1 {
      background: var(--color-1);
      width: 55vw; height: 55vw;
      top: -10%; left: -10%;
      animation: move1 28s infinite alternate cubic-bezier(0.4, 0, 0.2, 1), morph 12s infinite alternate ease-in-out;
    }
    .blob-2 {
      background: var(--color-2);
      width: 65vw; height: 65vw;
      bottom: -20%; right: -10%;
      animation: move2 35s infinite alternate cubic-bezier(0.25, 0.1, 0.25, 1), morph 18s infinite alternate-reverse ease-in-out;
    }
    .blob-3 {
      background: var(--color-3);
      width: 45vw; height: 45vw;
      top: 30%; left: 20%;
      animation: move3 22s infinite alternate cubic-bezier(0.42, 0, 0.58, 1), morph 14s infinite alternate ease-in-out;
    }
    .blob-4 {
      background: var(--color-4);
      width: 50vw; height: 50vw;
      bottom: 10%; left: 5%;
      animation: move4 30s infinite alternate ease-in-out, morph 20s infinite alternate ease-in-out;
    }
    .blob-5 {
      background: var(--color-5);
      width: 40vw; height: 40vw;
      top: 10%; right: 15%;
      animation: move5 25s infinite alternate cubic-bezier(0.3, 0.1, 0.3, 1), morph 16s infinite alternate-reverse ease-in-out;
    }

    @keyframes morph {
      0% { border-radius: 40% 60% 70% 30% / 40% 40% 60% 50%; }
      34% { border-radius: 70% 30% 50% 50% / 30% 30% 70% 70%; }
      67% { border-radius: 100% 60% 60% 100% / 100% 100% 60% 60%; }
      100% { border-radius: 40% 60% 70% 30% / 40% 40% 60% 50%; }
    }
    @keyframes move1 { 0% { transform: translate(0, 0) scale(1) rotate(0deg); } 50% { transform: translate(15vw, 25vh) scale(1.15) rotate(90deg); } 100% { transform: translate(-5vw, 15vh) scale(0.9) rotate(180deg); } }
    @keyframes move2 { 0% { transform: translate(0, 0) scale(1) rotate(0deg); } 33% { transform: translate(-20vw, -15vh) scale(0.9) rotate(-60deg); } 66% { transform: translate(-10vw, -30vh) scale(1.1) rotate(-120deg); } 100% { transform: translate(5vw, -10vh) scale(1) rotate(-180deg); } }
    @keyframes move3 { 0% { transform: translate(0, 0) scale(0.9) rotate(0deg); } 50% { transform: translate(25vw, -15vh) scale(1.25) rotate(120deg); } 100% { transform: translate(10vw, 25vh) scale(0.85) rotate(240deg); } }
    @keyframes move4 { 0% { transform: translate(0, 0) scale(1) rotate(0deg); } 50% { transform: translate(15vw, -20vh) scale(1.2) rotate(-90deg); } 100% { transform: translate(30vw, 5vh) scale(0.95) rotate(-180deg); } }
    @keyframes move5 { 0% { transform: translate(0, 0) scale(1) rotate(0deg); } 50% { transform: translate(-25vw, 20vh) scale(0.8) rotate(150deg); } 100% { transform: translate(-15vw, 35vh) scale(1.1) rotate(300deg); } }

    .noise-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: var(--noise-intensity);
      pointer-events: none;
      filter: contrast(150%) brightness(1000%);
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header {
      border-bottom: var(--border);
      padding-bottom: 20px;
      margin-bottom: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-size: calc(14px * 1.2);
      letter-spacing: 8px;
      font-weight: 400;
    }

    .controls {
      display: flex;
      gap: 20px;
    }

    button {
      background: var(--white);
      color: var(--black);
      border: var(--border);
      padding: 12px 24px;
      font-family: inherit;
      font-size: calc(11px * 1.2);
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.1s;
    }

    button:hover {
      background: var(--black);
      color: var(--white);
    }

    .categories {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .category {
      border: var(--border);
    }

    .cat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      cursor: pointer;
    }

    .cat-header:hover {
      background: #eee;
    }

    .category.expanded .cat-header {
      background: var(--black);
      color: var(--white);
    }

    .cat-title {
      font-size: calc(11px * 1.2);
      letter-spacing: 3px;
    }

    .cat-title span {
      margin-right: 10px;
    }

    .expand-icon {
      font-size: 12px;
      transition: transform 0.2s;
    }

    .category.expanded .expand-icon {
      transform: rotate(180deg);
    }

    .cat-body {
      display: none;
      border-top: var(--border);
      padding: 20px;
    }

    .category.expanded .cat-body {
      display: block;
    }

    .sub-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    .sub-tab {
      border: var(--border);
      padding: 10px 15px;
      font-size: calc(10px * 1.2);
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.1s;
    }

    .sub-tab:hover {
      background: var(--black);
      color: var(--white);
    }

    .sub-tab.active {
      background: var(--black);
      color: var(--white);
    }

    .sub-content {
      display: none;
    }

    .sub-content.active {
      display: block;
    }

    .selections {
      margin-top: 20px;
      border-top: var(--border);
      padding-top: 20px;
    }

    .sel-title {
      font-size: 12px;
      letter-spacing: 2px;
      margin-bottom: 15px;
      opacity: 0.5;
    }

    .opt-btn {
      border: var(--border);
      padding: 12px 16px;
      font-size: calc(10px * 1.2);
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.1s;
      display: inline-block;
    }

    .opt-btn:hover {
      background: var(--black);
      color: var(--white);
    }

    .sel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 15px;
    }

    .sel-item {
      border-left: var(--border);
      padding-left: 15px;
    }

    .sel-label {
      font-size: 12px;
      letter-spacing: 2px;
      opacity: 0.5;
      display: block;
      margin-bottom: 5px;
    }

    .sel-value {
      font-size: calc(12px * 1.2);
      letter-spacing: 1px;
      display: block;
      margin-bottom: 3px;
    }

    .sel-desc {
      font-size: calc(10px * 1.2);
      opacity: 0.6;
      display: block;
    }

    .export-area {
      margin-top: 40px;
      border-top: var(--border);
      padding-top: 20px;
    }

    textarea {
      width: 100%;
      height: 150px;
      background: var(--white);
      color: var(--black);
      border: var(--border);
      padding: 20px;
      font-family: inherit;
      font-size: calc(11px * 1.2);
      resize: none;
    }

    .copy-btn {
      margin-top: 10px;
    }

    .narrative-section {
      margin-top: 40px;
      border: var(--border);
      padding: 20px;
    }

    .narrative-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: var(--border);
      padding-bottom: 15px;
      margin-bottom: 15px;
    }

    .narrative-header h2 {
      font-size: calc(12px * 1.2);
      letter-spacing: 3px;
      font-weight: 500;
    }

    .narrative-settings {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #apiKey {
      border: var(--border);
      padding: 8px 12px;
      font-family: inherit;
      font-size: calc(10px * 1.2);
      background: var(--white);
      color: var(--black);
      width: 200px;
    }

    #modelSelect {
      border: var(--border);
      padding: 8px 12px;
      font-family: inherit;
      font-size: calc(10px * 1.2);
      background: var(--white);
      color: var(--black);
      cursor: pointer;
    }

    #generateNarrative {
      background: var(--black);
      color: var(--white);
      border: var(--border);
      padding: 10px 20px;
      font-family: inherit;
      font-size: calc(10px * 1.2);
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.1s;
    }

    #generateNarrative:hover {
      background: var(--white);
      color: var(--black);
    }

    #generateNarrative:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .narrative-output {
      min-height: 200px;
      font-size: calc(11px * 1.2);
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .narrative-output.loading {
      opacity: 0.5;
    }

    .narrative-output:empty::before {
      content: '生成的叙事将在此显示...';
      opacity: 0.4;
    }

    .model-hint {
      font-size: 12px;
      opacity: 0.5;
      margin-bottom: 10px;
    }

    .preview-section {
      margin-top: 20px;
      border: var(--border);
      padding: 20px;
    }

    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: var(--border);
      padding-bottom: 15px;
      margin-bottom: 15px;
    }

    .preview-header h2 {
      font-size: calc(12px * 1.2);
      letter-spacing: 3px;
      font-weight: 500;
    }

    #generatePreview {
      background: var(--black);
      color: var(--white);
      border: var(--border);
      padding: 10px 20px;
      font-family: inherit;
      font-size: calc(10px * 1.2);
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.1s;
    }

    #generatePreview:hover {
      background: var(--white);
      color: var(--black);
    }

    #generatePreview:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .preview-body {
      display: flex;
      gap: 20px;
    }

    .preview-left {
      flex: 7;
      min-width: 0;
    }

    .preview-right {
      flex: 3;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .preview-output {
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }

    .preview-output:empty::before {
      content: '世界预览...';
      opacity: 0.4;
      font-size: calc(11px * 1.2);
    }

    .preview-output img {
      max-width: 100%;
      border: var(--border);
    }

    .preview-prompt-display {
      font-size: 12px;
      opacity: 0.5;
      line-height: 1.6;
      white-space: pre-wrap;
      border-top: var(--border);
      padding-top: 10px;
      margin-top: 10px;
      width: 100%;
    }

    .race-portrait {
      width: 100%;
      aspect-ratio: 3 / 4;
      border: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: rgba(0,0,0,0.02);
    }

    .race-portrait:empty::before {
      content: '族群肖像...';
      opacity: 0.4;
      font-size: calc(10px * 1.2);
    }

    .race-portrait img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .race-info {
      font-size: calc(10px * 1.2);
      line-height: 1.7;
    }

    .race-name {
      font-size: calc(12px * 1.2);
      letter-spacing: 2px;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .race-desc {
      opacity: 0.7;
      font-size: calc(10px * 1.2);
      line-height: 1.7;
    }

    .race-prompt-display {
      font-size: 12px;
      opacity: 0.4;
      line-height: 1.5;
      border-top: var(--border);
      padding-top: 8px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div id="fluid-bg-wrapper">
    <div class="gradient-container">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
      <div class="blob blob-4"></div>
      <div class="blob blob-5"></div>
    </div>
    <div class="noise-overlay"></div>
  </div>

  <div class="container">
    <header>
      <h1>WORLDBUILD GEN</h1>
      <div class="controls">
        <button onclick="generateWorld()">GENERATE</button>
        <button onclick="resetAll()">RESET</button>
      </div>
    </header>

    <div class="categories" id="categories"></div>

    <div class="export-area">
      <textarea id="exportText" readonly placeholder="选择或生成后显示输出"></textarea>
      <button class="copy-btn" onclick="copyExport()">COPY TEXT</button>
    </div>

    <div class="narrative-section">
      <div class="narrative-header">
        <h2>NARRATIVE</h2>
        <div class="narrative-settings">
          <select id="providerSelect" onchange="onProviderChange()" style="border: var(--border); padding: 8px 12px; font-family: inherit; font-size: calc(10px * 1.2); background: var(--black); color: var(--white);">
            <option value="openrouter">OpenRouter</option>
            <option value="minimax">MiniMax</option>
          </select>
          <input type="password" id="apiKey" placeholder="OpenRouter API Key" />
          <input type="text" id="groupId" placeholder="GroupId" style="border: var(--border); padding: 8px 12px; font-family: inherit; font-size: calc(10px * 1.2); background: var(--white); color: var(--black); width: 120px; display: none;" />
          <select id="modelId" style="border: var(--border); padding: 8px 12px; font-family: inherit; font-size: calc(10px * 1.2); width: 200px; background: var(--black); color: var(--white);"></select>
          <button id="generateNarrative" onclick="generateNarrative()">GENERATE NARRATIVE</button>
        </div>
      </div>
      <div id="narrativeStatus" style="font-size: 12px; opacity: 0.5; margin-bottom: 8px;"></div>
      <div id="narrativeOutput" class="narrative-output"></div>
    </div>

    <div class="preview-section">
      <div class="preview-header">
        <h2>WORLD PREVIEW</h2>
        <div style="display:flex;gap:10px;">
          <button id="generatePreview" onclick="generatePreview()">GENERATE WORLD</button>
          <button id="generateRaceBtn" onclick="generateRace()">GENERATE RACE</button>
        </div>
      </div>
      <div style="display:flex;gap:10px;font-size:12px;opacity:0.5;margin-bottom:8px;">
        <span id="previewStatus" style="flex:7"></span>
        <span id="raceStatus" style="flex:3"></span>
      </div>
      <div class="preview-body">
        <div class="preview-left">
          <div id="previewOutput" class="preview-output"></div>
        </div>
        <div class="preview-right">
          <div id="racePortrait" class="race-portrait"></div>
          <div id="raceInfo" class="race-info"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ═══════ Provider Config ═══════
    const PROVIDERS = {
      openrouter: {
        name: 'OpenRouter',
        endpoint: 'https://openrouter.ai/api/v1/chat/completions',
        models: [
          { id: 'google/gemma-3-27b-it:free', label: 'Gemma 3 27B (Free)' },
          { id: 'meta-llama/llama-4-maverick:free', label: 'Llama 4 Maverick (Free)' },
          { id: 'deepseek/deepseek-chat-v3-0324:free', label: 'DeepSeek V3 (Free)' },
          { id: 'qwen/qwen3-235b-a22b:free', label: 'Qwen3 235B (Free)' },
        ],
        headers: (key) => ({
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${key}`,
          'HTTP-Referer': location.href,
          'X-Title': 'WorldBuild Gen'
        })
      },
      minimax: {
        name: 'MiniMax',
        endpoint: (groupId) => groupId
          ? `https://api.minimax.chat/v1/text/chatcompletion_v2?GroupId=${groupId}`
          : 'https://api.minimax.chat/v1/chat/completions',
        models: [
          { id: 'MiniMax-M2.7', label: 'MiniMax-M2.7' },
          { id: 'MiniMax-M2', label: 'MiniMax-M2' },
          { id: 'abab6.5s', label: 'abab6.5s' },
          { id: 'abab6.5', label: 'abab6.5' },
        ],
        headers: (key) => ({
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${key}`
        }),
        needsGroupId: true
      }
    };

    // ═══════ Retry with exponential backoff ═══════
    async function fetchWithRetry(url, options, maxRetries = 3) {
      for (let attempt = 0; attempt <= maxRetries; attempt++) {
        const res = await fetch(url, options);
        if (res.status === 429 && attempt < maxRetries) {
          const retryAfter = parseInt(res.headers.get('Retry-After') || '0', 10);
          const delay = retryAfter > 0 ? retryAfter * 1000 : Math.pow(2, attempt) * 1500;
          setStatus(`限流中 — ${Math.round(delay / 1000)}s 后重试 (${attempt + 1}/${maxRetries})...`);
          await new Promise(r => setTimeout(r, delay));
          continue;
        }
        return res;
      }
    }

    function setStatus(msg) {
      document.getElementById('narrativeStatus').textContent = msg;
    }

    // ═══════ Provider / Model UI ═══════
    function getProvider() {
      return PROVIDERS[document.getElementById('providerSelect').value];
    }

    function onProviderChange() {
      const prov = getProvider();
      const sel = document.getElementById('modelId');
      sel.innerHTML = prov.models.map(m => `<option value="${m.id}">${m.label}</option>`).join('');
      document.getElementById('apiKey').placeholder = `${prov.name} API Key`;
      document.getElementById('groupId').style.display = prov.needsGroupId ? '' : 'none';
      // persist choice
      localStorage.setItem('wb_provider', document.getElementById('providerSelect').value);
    }

    // ═══════ localStorage persistence ═══════
    function loadSavedSettings() {
      const savedProvider = localStorage.getItem('wb_provider');
      if (savedProvider && PROVIDERS[savedProvider]) {
        document.getElementById('providerSelect').value = savedProvider;
      }
      onProviderChange();
      const savedKey = localStorage.getItem('wb_apiKey');
      if (savedKey) document.getElementById('apiKey').value = savedKey;
      const savedGid = localStorage.getItem('wb_groupId');
      if (savedGid) document.getElementById('groupId').value = savedGid;
    }

    function getEndpoint(provider) {
      if (typeof provider.endpoint === 'function') {
        const groupId = document.getElementById('groupId').value.trim();
        return provider.endpoint(groupId);
      }
      return provider.endpoint;
    }

    function saveApiKey() {
      const key = document.getElementById('apiKey').value.trim();
      if (key) localStorage.setItem('wb_apiKey', key);
      const gid = document.getElementById('groupId').value.trim();
      if (gid) localStorage.setItem('wb_groupId', gid);
    }

    const worldData = {
      environment: {
        title: 'ENVIRONMENT',
        icon: '◆',
        subs: {
          energy: {
            label: '能量来源',
            options: [
              { name: '太阳能', desc: '恒星辐射作为主要能源' },
              { name: '地热能', desc: '行星内部热量驱动文明' },
              { name: '暗物质', desc: '神秘暗物质能量转化' },
              { name: '核聚变', desc: '人造小太阳提供能源' },
              { name: '生物能', desc: '有机体新陈代谢供能' },
              { name: '魔法能量', desc: '超自然能量场抽取' },
              { name: '🎲 随机', desc: '【Fill in 能量来源的随机变量，如恒星级事件、能量潮汐（仅作参考）】' }
            ]
          },
          habitat: {
            label: '栖息地',
            options: [
              { name: '星球表面', desc: '行星陆地居住' },
              { name: '地下都市', desc: '地底深层建筑群' },
              { name: '海洋城市', desc: '海底或水面建造' },
              { name: '太空殖民', desc: '轨道站或星际飞船' },
              { name: '平行维度', desc: '多重宇宙穿梭' },
              { name: '星舰文明', desc: '移动的星际家园' },
              { name: '🎲 随机', desc: '【Fill in 栖息地的随机变量，如地质剧变、空间异常（仅作参考）】' }
            ]
          },
          resource: {
            label: '关键资源',
            options: [

              { name: '🎲 随机', desc: '【Fill in 贸易网络的随机变量，如商路断裂、新兴市场（仅作参考）】' }
            ]
          }
        }
      }
    };

    let selections = {};
    let expandedCategory = null;
    let activeSub = {};

    function init() {
      const container = document.getElementById('categories');
      let html = '';

      Object.keys(worldData).forEach(key => {
        const cat = worldData[key];
        const subKeys = Object.keys(cat.subs);
        const firstSub = subKeys[0];

        html += `
          <div class="category" id="cat-${key}">
            <div class="cat-header" onclick="toggleCategory('${key}')">
              <div class="cat-title"><span>${cat.icon}</span>${cat.title}</div>
              <div class="expand-icon">▼</div>
            </div>
            <div class="cat-body">
              <div class="sub-tabs">
                ${subKeys.map(subKey => `
                  <div class="sub-tab" id="tab-${key}-${subKey}" onclick="selectSub('${key}', '${subKey}')">${cat.subs[subKey].label}</div>
                `).join('')}
              </div>
              ${subKeys.map(subKey => `
                <div class="sub-content" id="sub-${key}-${subKey}">
                  <div class="option-grid">
                    ${cat.subs[subKey].options.map(opt => `
                      <div class="opt-btn" onclick="selectOption('${key}', '${subKey}', '${opt.name}')">${opt.name}</div>
                    `).join('')}
                  </div>
                </div>
              `).join('')}
              <div class="selections" id="sels-${key}">
                <div class="sel-title">SELECTED</div>
                <div class="sel-grid" id="selgrid-${key}"></div>
              </div>
            </div>
          </div>
        `;

        activeSub[key] = firstSub;
      });

      container.innerHTML = html;

      // Initialize first sub-tab as active for each expanded category
      Object.keys(worldData).forEach(key => {
        const subKeys = Object.keys(worldData[key].subs);
        const firstSub = subKeys[0];
        document.getElementById(`tab-${key}-${firstSub}`)?.classList.add('active');
        document.getElementById(`sub-${key}-${firstSub}`)?.classList.add('active');
      });
    }

    function toggleCategory(key) {
      const cat = document.getElementById(`cat-${key}`);

      if (expandedCategory === key) {
        cat.classList.remove('expanded');
        expandedCategory = null;
      } else {
        // Close previous
        document.querySelectorAll('.category').forEach(c => c.classList.remove('expanded'));
        cat.classList.add('expanded');
        expandedCategory = key;
      }
    }

    function selectSub(catKey, subKey) {
      // Remove active from all subs in this category
      Object.keys(worldData[catKey].subs).forEach(sk => {
        document.getElementById(`tab-${catKey}-${sk}`)?.classList.remove('active');
        document.getElementById(`sub-${catKey}-${sk}`)?.classList.remove('active');
      });

      // Activate selected
      document.getElementById(`tab-${catKey}-${subKey}`)?.classList.add('active');
      document.getElementById(`sub-${catKey}-${subKey}`)?.classList.add('active');
      activeSub[catKey] = subKey;
    }

    function selectOption(catKey, subKey, optName) {
      const sub = worldData[catKey].subs[subKey];
      const opt = sub.options.find(o => o.name === optName);

      if (!opt) return;

      if (!selections[catKey]) selections[catKey] = {};

      // If random is selected, use the placeholder itself
      if (optName === '🎲 随机') {
        selections[catKey][subKey] = opt;
      } else {
        selections[catKey][subKey] = opt;
      }

      renderSelections(catKey);
      renderExport();
    }

    function renderSelections(catKey) {
      const selGrid = document.getElementById(`selgrid-${catKey}`);
      if (!selGrid) return;

      const catSels = selections[catKey];
      if (!catSels || Object.keys(catSels).length === 0) {
        selGrid.innerHTML = '';
        return;
      }

      let html = '';
      Object.keys(catSels).forEach(subKey => {
        const sel = catSels[subKey];
        if (sel) {
          html += `
            <div class="sel-item">
              <span class="sel-label">${worldData[catKey].subs[subKey].label}</span>
              <span class="sel-value">${sel.name}</span>
              <span class="sel-desc">${sel.desc}</span>
            </div>
          `;
        }
      });

      selGrid.innerHTML = html;
    }

    function generateWorld() {
      selections = {};

      Object.keys(worldData).forEach(catKey => {
        selections[catKey] = {};
        Object.keys(worldData[catKey].subs).forEach(subKey => {
          const opts = worldData[catKey].subs[subKey].options;
          const randomOpt = opts.find(o => o.name.startsWith('🎲'));
          const nonRandomOpts = opts.filter(o => !o.name.startsWith('🎲'));

          // 10% chance to pick random placeholder
          if (randomOpt && Math.random() < 0.1) {
            selections[catKey][subKey] = randomOpt;
          } else {
            selections[catKey][subKey] = nonRandomOpts[Math.floor(Math.random() * nonRandomOpts.length)];
          }
        });
        renderSelections(catKey);
      });

      renderExport();
    }

    function renderExport() {
      const exportText = document.getElementById('exportText');
      let lines = [];

      Object.keys(worldData).forEach(catKey => {
        const cat = worldData[catKey];
        const catSels = selections[catKey];

        if (catSels && Object.keys(catSels).some(k => catSels[k])) {
          lines.push(`━━━ ${cat.icon} ${cat.title} ━━━`);

          Object.keys(cat.subs).forEach(subKey => {
            const sel = catSels[subKey];
            if (sel) {
              lines.push(`[${cat.subs[subKey].label}]`);
              lines.push(`  ${sel.name} — ${sel.desc}`);
            }
          });

          lines.push('');
        }
      });

      exportText.value = lines.join('\n');
    }

    function copyExport() {
      const text = document.getElementById('exportText');
      if (text.value) {
        text.select();
        document.execCommand('copy');
        alert('已复制');
      }
    }

    function resetAll() {
      selections = {};
      document.querySelectorAll('.category').forEach(c => c.classList.remove('expanded'));
      document.querySelectorAll('.sel-grid').forEach(g => g.innerHTML = '');
      document.getElementById('exportText').value = '';
      document.getElementById('narrativeOutput').innerHTML = '';
      expandedCategory = null;
    }

    let isGenerating = false;

    async function generateNarrative() {
      if (isGenerating) return; // debounce

      const apiKey = document.getElementById('apiKey').value.trim();
      if (!apiKey) {
        alert('请输入 API Key');
        return;
      }

      saveApiKey();

      const provider = getProvider();
      const model = document.getElementById('modelId').value;
      const output = document.getElementById('narrativeOutput');
      const btn = document.getElementById('generateNarrative');

      // Collect all selections
      let configText = '';
      Object.keys(worldData).forEach(catKey => {
        const cat = worldData[catKey];
        const catSels = selections[catKey];
        if (catSels && Object.keys(catSels).some(k => catSels[k])) {
          configText += `【${cat.title}】\n`;
          Object.keys(cat.subs).forEach(subKey => {
            const sel = catSels[subKey];
            if (sel) {
              configText += `- ${cat.subs[subKey].label}: ${sel.name}\n`;
              configText += `  ${sel.desc}\n`;
            }
          });
          configText += '\n';
        }
      });

      if (!configText.trim()) {
        alert('请先选择或生成世界元素');
        return;
      }

      const systemPrompt = `You are a worldbuilding expert. Based on the configuration provided, generate an immersive, engaging narrative description of this world. The description should:

1. Be written in Simplified Chinese (简体中文)
2. Weave together all the elements into a coherent world narrative
3. Highlight tensions, conflicts, and unique characteristics
4. Describe the world as if writing for a novel or game setting
5. Be evocative and imaginative, not just a list
6. Around 500-800 characters

DO NOT simply list the elements. Instead, create a vivid description that shows how these elements interact and shape this world.`;

      const userPrompt = `Generate a world narrative based on this configuration:\n\n${configText}`;

      isGenerating = true;
      btn.disabled = true;
      output.textContent = '';
      output.classList.add('loading');
      setStatus('连接中...');

      const endpoint = getEndpoint(provider);
      const isLegacy = endpoint.includes('chatcompletion_v2');
      const useStream = !isLegacy;

      try {
        const reqBody = {
          model: model,
          messages: [
            { role: 'system', content: systemPrompt },
            { role: 'user', content: userPrompt }
          ],
          temperature: 0.8,
          max_tokens: 2000,
        };
        if (useStream) reqBody.stream = true;
        // Legacy MiniMax uses tokens_to_generate instead of max_tokens
        if (isLegacy) { reqBody.tokens_to_generate = 2000; delete reqBody.max_tokens; }

        const response = await fetchWithRetry(endpoint, {
          method: 'POST',
          headers: provider.headers(apiKey),
          body: JSON.stringify(reqBody)
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          const msg = errorData.error?.message || errorData.base_resp?.status_msg || response.statusText;
          if (response.status === 401) {
            throw new Error(`Authentication failed (401): check your ${provider.name} API key. ${msg}`);
          } else if (response.status === 429) {
            throw new Error(`Rate limited (429): ${provider.name} quota exceeded after retries. ${msg}`);
          }
          throw new Error(`API Error ${response.status}: ${msg}`);
        }

        output.classList.remove('loading');

        if (isLegacy) {
          // ── Legacy MiniMax (chatcompletion_v2) ──
          setStatus('生成中...');
          const data = await response.json();
          if (data.base_resp?.status_code !== 0) {
            throw new Error(`MiniMax Error: ${data.base_resp?.status_msg || 'unknown'}`);
          }
          const narrative = data.choices?.[0]?.message?.content || data.reply || data.choices?.[0]?.messages?.[0]?.text || data.choices?.[0]?.text || '';
          output.textContent = narrative || '未收到内容，请尝试其他模型';
          setStatus('');
          if (narrative) { generatePreview(); generateRace(); }
        } else {
          // ── Streaming (OpenAI-compatible) ──
          setStatus('输出中...');
          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';
          let fullText = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();

            for (const line of lines) {
              const trimmed = line.trim();
              if (!trimmed || !trimmed.startsWith('data: ')) continue;
              const payload = trimmed.slice(6);
              if (payload === '[DONE]') break;
              try {
                const json = JSON.parse(payload);
                const delta = json.choices?.[0]?.delta?.content;
                if (delta) {
                  fullText += delta;
                  output.textContent = fullText;
                }
              } catch (e) { /* skip malformed chunk */ }
            }
          }

          if (!fullText.trim()) {
            output.textContent = '未收到内容，请尝试其他模型';
          }
          setStatus('');
          if (fullText.trim()) { generatePreview(); generateRace(); }
        }

      } catch (error) {
        output.classList.remove('loading');
        output.textContent = `Error: ${error.message}`;
        setStatus('');
      } finally {
        btn.disabled = false;
        isGenerating = false;
      }
    }

    // ═══════ World Preview (Narrative → LLM translate → Pollinations) ═══════
    let isPreviewGenerating = false;

    function setPreviewStatus(msg) {
      document.getElementById('previewStatus').textContent = msg;
    }

    async function generatePreview() {
      if (isPreviewGenerating) return;

      const narrativeText = document.getElementById('narrativeOutput').textContent.trim();
      if (!narrativeText || narrativeText.startsWith('Error:')) {
        alert('请先生成叙事文本');
        return;
      }

      const apiKey = document.getElementById('apiKey').value.trim();
      if (!apiKey) { alert('请先输入 API Key'); return; }

      const provider = getProvider();
      const model = document.getElementById('modelId').value;
      const output = document.getElementById('previewOutput');
      const btn = document.getElementById('generatePreview');

      isPreviewGenerating = true;
      btn.disabled = true;
      output.innerHTML = '';
      setPreviewStatus('1/2 — 翻译场景描述...');

      try {
        // Step 1: LLM translate narrative → English scene prompt
        const translatePrompt = `Convert the following world narrative into a single concise English image generation prompt (under 100 words). Focus on: landscape, architecture, lighting, atmosphere, color palette, key visual elements. Use vivid, concrete visual language. Output ONLY the prompt, nothing else.

Narrative:
${narrativeText}`;

        const ep = getEndpoint(provider);
        const isLeg = ep.includes('chatcompletion_v2');
        const body = { model, messages: [{ role: 'user', content: translatePrompt }], temperature: 0.8 };
        if (isLeg) { body.tokens_to_generate = 250; } else { body.max_tokens = 250; }

        const res = await fetchWithRetry(ep, {
          method: 'POST',
          headers: provider.headers(apiKey),
          body: JSON.stringify(body)
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(`LLM Error ${res.status}: ${err.error?.message || err.base_resp?.status_msg || res.statusText}`);
        }

        const data = await res.json();
        if (isLeg && data.base_resp?.status_code !== 0) {
          throw new Error(`MiniMax Error: ${data.base_resp?.status_msg || 'unknown'}`);
        }
        // Try every known response path
        const scenePrompt = (
          data.choices?.[0]?.message?.content ||   // OpenAI-compatible
          data.reply ||                             // legacy .reply
          data.choices?.[0]?.messages?.[0]?.text || // legacy .messages[].text
          data.choices?.[0]?.text ||                // fallback
          data.output?.text ||                      // fallback
          ''
        ).trim();

        if (!scenePrompt) {
          console.warn('Preview: empty scene prompt. Raw response:', JSON.stringify(data));
          throw new Error('LLM 返回空场景描述，按 F12 查看原始响应');
        }

        // Step 2: Pollinations.ai
        setPreviewStatus('2/2 — 生成图片...');

        const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(scenePrompt)}?width=896&height=512&nologo=true&seed=${Date.now()}`;
        const img = new Image();
        img.alt = 'World Preview';
        img.style.maxWidth = '100%';
        img.style.border = 'var(--border)';

        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = () => reject(new Error('图片生成失败'));
          img.src = imgUrl;
        });

        output.innerHTML = '';
        output.appendChild(img);
        const pd = document.createElement('div');
        pd.className = 'preview-prompt-display';
        pd.textContent = `Scene prompt: ${scenePrompt}`;
        output.appendChild(pd);
        setPreviewStatus('');

      } catch (error) {
        output.innerHTML = `<span style="opacity:0.6">Error: ${error.message}</span>`;
        setPreviewStatus('');
      } finally {
        btn.disabled = false;
        isPreviewGenerating = false;
      }
    }

    // ═══════ Race Generator ═══════
    const RACE_LAYERS = {
      body: { label: '本体（体态/生理/外貌）', keys: [['xvariable','type'], ['environment','ecology'], ['environment','habitat']] },
      culture: { label: '服饰/行为/民俗', keys: [['religion','belief'], ['actors','organization'], ['technology','specialty'], ['environment','habitat']] },
      social: { label: '社会组织', keys: [['politics','system']] },
    };

    let isRaceGenerating = false;

    function setRaceStatus(msg) {
      document.getElementById('raceStatus').textContent = msg;
    }

    function collectRaceContext() {
      let sections = [];
      let hasAny = false;
      for (const [layer, cfg] of Object.entries(RACE_LAYERS)) {
        let lines = [];
        const seen = new Set();
        for (const [cat, sub] of cfg.keys) {
          const sel = selections[cat]?.[sub];
          const uid = `${cat}.${sub}`;
          if (sel && !seen.has(uid)) {
            seen.add(uid);
            lines.push(`  ${worldData[cat].subs[sub].label}: ${sel.name} — ${sel.desc}`);
          }
        }
        if (lines.length) {
          hasAny = true;
          sections.push(`[${cfg.label}]\n${lines.join('\n')}`);
        }
      }
      return hasAny ? sections.join('\n\n') : '';
    }

    async function generateRace() {
      if (isRaceGenerating) return;

      const apiKey = document.getElementById('apiKey').value.trim();
      if (!apiKey) { alert('请先输入 API Key'); return; }

      const raceCtx = collectRaceContext();
      if (!raceCtx) { alert('请先选择或生成世界元素'); return; }

      const provider = getProvider();
      const model = document.getElementById('modelId').value;
      const portrait = document.getElementById('racePortrait');
      const info = document.getElementById('raceInfo');
      const btn = document.getElementById('generateRaceBtn');

      isRaceGenerating = true;
      btn.disabled = true;
      portrait.innerHTML = '';
      info.innerHTML = '';
      setRaceStatus('生成族群...');

      try {
        const prompt = `You are a sci-fi/fantasy creature designer. Create a unique species based on the layered world elements below. Each layer determines a specific aspect:

${raceCtx}

Rules:
- 「本体」决定生理结构：X变量如RNA不稳定性→肢体变异/再生能力；生态如深海热泉→耐高温皮肤/生物发光；栖息地如地下→大眼无色素
- 「服饰/行为/民俗」决定穿着与习惯：信仰→仪式纹饰/禁忌配色；组织→阶级徽章/制服；技术→植入物/工具配件；栖息地→材质选择
- 「社会组织」决定群体行为：蜂群意识→动作同步/个体无表情；无政府→装扮混乱多样；极权→整齐划一

Output STRICTLY valid JSON, no markdown fences:
{"name":"族群名称（简中2-4字）","description":"简中150字，分三段：外貌体态 / 服饰行为 / 社会特征","portrait_prompt":"English under 80 words. Single representative member: anatomy, skin, eyes per 本体; clothing, accessories, markings per 服饰; posture, expression per 社会. Cinematic concept art."}`;

        const ep = getEndpoint(provider);
        const isLeg = ep.includes('chatcompletion_v2');
        const body = { model, messages: [{ role: 'user', content: prompt }], temperature: 0.85 };
        if (isLeg) { body.tokens_to_generate = 600; } else { body.max_tokens = 600; }

        const res = await fetchWithRetry(ep, {
          method: 'POST',
          headers: provider.headers(apiKey),
          body: JSON.stringify(body)
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(`LLM ${res.status}: ${err.error?.message || err.base_resp?.status_msg || res.statusText}`);
        }

        const data = await res.json();
        if (isLeg && data.base_resp?.status_code !== 0) {
          throw new Error(`MiniMax: ${data.base_resp?.status_msg || 'unknown'}`);
        }

        const raw = (
          data.choices?.[0]?.message?.content ||
          data.reply ||
          data.choices?.[0]?.messages?.[0]?.text ||
          ''
        ).trim();

        // Extract JSON from response (handle markdown fences)
        const jsonMatch = raw.match(/\{[\s\S]*\}/);
        if (!jsonMatch) {
          console.warn('Race: cannot parse JSON from:', raw);
          throw new Error('LLM 未返回有效 JSON');
        }

        const race = JSON.parse(jsonMatch[0]);
        if (!race.name || !race.portrait_prompt) {
          throw new Error('响应缺少 name 或 portrait_prompt');
        }

        // Display text info
        info.innerHTML = `<div class="race-name">${race.name}</div><div class="race-desc">${race.description || ''}</div>`;

        // Generate portrait
        setRaceStatus('生成肖像...');
        const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(race.portrait_prompt)}?width=576&height=768&nologo=true&seed=${Date.now()}`;

        const img = new Image();
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = () => reject(new Error('肖像生成失败'));
          img.src = imgUrl;
        });

        portrait.innerHTML = '';
        portrait.appendChild(img);

        // Append prompt below info
        info.innerHTML += `<div class="race-prompt-display">${race.portrait_prompt}</div>`;
        setRaceStatus('');

      } catch (error) {
        portrait.innerHTML = `<span style="opacity:0.4;font-size:12px">Error</span>`;
        info.innerHTML = `<span style="opacity:0.6;font-size:calc(10px*1.2)">${error.message}</span>`;
        setRaceStatus('');
      } finally {
        btn.disabled = false;
        isRaceGenerating = false;
      }
    }

    init();
    loadSavedSettings();
  </script>
</body>
</html>
